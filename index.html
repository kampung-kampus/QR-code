<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plot 1 - Acerola cherry</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9f9f9;
    }
    h1 {
      color: #2c3e50;
    }
    .images img {
      max-width: 200px;
      margin: 10px;
      border: 2px solid #ccc;
      border-radius: 5px;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>

  <img src="Images/acerola.jpg" alt="Acerola Cherry" style="max-width:200px;">

  <img src="Images/acerola cherry.jpg" alt="Acerola Cherry" style="max-width:200px;">
</head>
<body>

  <h1>Plot Information</h1>
  <div id="plotData"></div>

  <script>
    // Example JSON data for Plot 1
    const plotData = {
      plotNumber: 1,
      plantName: "Acerola cherry",
      datePlanted: "2026-02-01",
      expectedHarvest: "2026-03-15",
      lastManure: "2026-02-20",
      lastWeeded: "2026-02-25",
      lastScan: "2026-03-02",
      uses: "Rich in vitamins, used in salads.",
      funFacts: "Acerola cherry is often called the king of Vitamin C since each cherry contains about 200mg of the vitamin. This is one of the highest among all fruits!",
      images: [
       
      ]
    };

    // Render data into the page
    const container = document.getElementById("plotData");
    container.innerHTML = `
      <div class="section"><strong>Plot Number:</strong> ${plotData.plotNumber}</div>
      <div class="section"><strong>Plant Name:</strong> ${plotData.plantName}</div>
      <div class="section"><strong>Date Planted:</strong> ${plotData.datePlanted}</div>
      <div class="section"><strong>Expected Harvest:</strong> ${plotData.expectedHarvest}</div>
      <div class="section"><strong>Uses:</strong> ${plotData.uses}</div>
      <div class="section"><strong>Fun Facts:</strong> ${plotData.funFacts}</div>
      <div class="section images">
        <strong>Plant Images:</strong><br>
        ${plotData.images.map(img => `<img src="${img}" alt="Plant image">`).join("")}
      </div>
    `;
  </script>

</body>
</html>

 images: [
        "images/",
        "images/Images/acerola.jpg",
      ]
